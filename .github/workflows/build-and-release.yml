name: Build and Release iTeamTalkPlus IPA

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  APP_NAME: "iTeamTalkPlus"
  PROJECT_PATH: "iTeamTalk.xcodeproj"
  SCHEME: "iTeamTalk"
  XCODE_VERSION: "15.0"

jobs:
  build-ipa:
    name: Build IPA (unsigned, for AltStore)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer

      - name: Show build settings
        run: |
          xcodebuild -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -showBuildSettings \
            -destination "generic/platform=iOS" \
            2>&1 | head -50

      - name: Build .app bundle (unsigned)
        run: |
          xcodebuild clean build \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration ${{ github.event.inputs.build_config || 'Release' }} \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO

      - name: Create IPA structure
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r "${{ env.APP_NAME }}.ipa" Payload/
          echo "IPA created: $(pwd)/${{ env.APP_NAME }}.ipa"
          ls -lh "${{ env.APP_NAME }}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-unsigned-${{ github.run_number }}
          path: build/${{ env.APP_NAME }}.ipa
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.APP_NAME }}.ipa
          body: |
            ## iTeamTalkPlus ${{ github.ref_name }}

            ### Download
            Download the unsigned IPA below and sign with AltStore.

            ### Features
            - 12-tab dashboard interface (Channels, Chat, Global, Private, Media, Files, Server Management, Users, Status, Events, My Status, Settings)
            - Server administration (user accounts, ban list, server properties)
            - Enhanced audio processing (AGC, noise suppression, echo cancellation)
            - Media streaming (voice, video, desktop, file)
            - File transfer management (upload/download/delete)
            - Push-to-talk with lock, voice activation
            - Text-to-speech event notifications
            - Broadcast, channel, and private messaging
            - Accessibility support with VoiceOver
            - 19 languages supported

            ### How to Sign with AltStore
            1. Download the IPA artifact
            2. Open AltStore on your iOS device
            3. Tap "My Apps" → "+" and select the IPA
            4. Enter your Apple ID when prompted
            5. AltStore will sign and install the app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
