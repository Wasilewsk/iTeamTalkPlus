name: Build and Release iTeamTalkPlus IPA

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  APP_NAME: "iTeamTalkPlus"
  PROJECT_PATH: "iTeamTalk.xcodeproj"
  SCHEME: "iTeamTalk"
  XCODE_VERSION: "15.0"

jobs:
  build-ipa:
    name: Build IPA
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer

      - name: Setup TeamTalk SDK
        run: |
          mkdir -p Library/TeamTalk_DLL
          # Decode the TeamTalk SDK binary from GitHub secret
          if [ -n "${{ secrets.TEAMTALK_SDK_BASE64 }}" ]; then
            echo "${{ secrets.TEAMTALK_SDK_BASE64 }}" | base64 -d > Library/TeamTalk_DLL/libTeamTalk5.a
            echo "SDK binary installed"
          else
            echo "WARNING: No TeamTalk SDK binary found."
            echo "Create a GitHub secret called TEAMTALK_SDK_BASE64 containing"
            echo "the base64-encoded libTeamTalk5.a from BearWare."
            echo ""
            echo "Command to encode: base64 -i libTeamTalk5.a | pbcopy"
            echo "File will be created empty for now."
            touch Library/TeamTalk_DLL/libTeamTalk5.a
          fi

      - name: Setup License
        run: |
          if [ -n "${{ secrets.REGISTRATION_NAME }}" ] && [ -n "${{ secrets.REGISTRATION_KEY }}" ]; then
            cat > iTeamTalk/License.swift << 'LICENSE'
          /*
           * TeamTalk SDK License
           * Auto-generated by CI
           */
          import Foundation
          let REGISTRATION_NAME = "${{ secrets.REGISTRATION_NAME }}"
          let REGISTRATION_KEY = "${{ secrets.REGISTRATION_KEY }}"
          LICENSE
            echo "License configured"
          else
            echo "WARNING: No license configured. The app will compile but TeamTalkKit won't initialize."
            echo "Set REGISTRATION_NAME and REGISTRATION_KEY secrets from your BearWare SDK license."
          fi

      - name: Show build settings
        run: |
          xcodebuild -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -showBuildSettings \
            -destination "generic/platform=iOS" \
            2>&1 | head -30

      - name: Build .app bundle
        run: |
          xcodebuild clean build \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration ${{ github.event.inputs.build_config || 'Release' }} \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO

      - name: Create unsigned IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found!"
            find build/DerivedData -name "*.app" -type d
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r "${{ env.APP_NAME }}-unsigned.ipa" Payload/
          echo "IPA created: $(pwd)/${{ env.APP_NAME }}-unsigned.ipa"
          ls -lh "${{ env.APP_NAME }}-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.run_number }}
          path: build/${{ env.APP_NAME }}-unsigned.ipa
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.APP_NAME }}-unsigned.ipa
          body: |
            ## iTeamTalkPlus ${{ github.ref_name }}

            ### Download
            Download the unsigned IPA below and sign with AltStore.

            ### Features
            - 12-tab dashboard (Channels, Chat, Global, Private, Media, Files, Server Management, Users, Status, Events, My Status, Settings)
            - Server administration (user accounts, bans, properties)
            - Enhanced audio processing (AGC, NS, EC)
            - Media streaming (voice, video, desktop, file)
            - File transfer management
            - Push-to-talk with lock, voice activation
            - Text-to-speech event notifications
            - Broadcast, channel, and private messaging
            - Accessibility with VoiceOver
            - 19 languages

            ### Signing with AltStore
            1. Download the unsigned IPA
            2. Open AltStore on iOS → My Apps → + → select IPA
            3. Enter Apple ID when prompted
            4. AltStore signs and installs

            ### Requirements
            - TeamTalk SDK license from BearWare.dk (for libTeamTalk5.a)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
