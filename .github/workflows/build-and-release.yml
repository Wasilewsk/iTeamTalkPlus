name: Build and Release iTeamTalkPlus-iOS

on:
  push:
    branches: [ "main", "develop" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]

env:
  APP_NAME: "iTeamTalkPlus"
  BUNDLE_IDENTIFIER: "com.bearware.iteamtalkplus"
  XCODE_VERSION: "15.0"

jobs:
  test:
    name: Test
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer
      - name: Build and Test
        run: |
          xcodebuild test \
            -project iTeamTalk.xcodeproj \
            -scheme iTeamTalk \
            -destination "platform=iOS Simulator,OS=16.4,name=iPhone 14" \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            -enableCodeCoverage YES \
            test-without-building || \
          xcodebuild test \
            -project iTeamTalk.xcodeproj \
            -scheme iTeamTalk \
            -destination "platform=iOS Simulator,name=iPhone 14" \
            -configuration Debug \
            -derivedDataPath build/DerivedData

  build:
    name: Build
    runs-on: macos-13
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer
      - name: Build Archive
        run: |
          xcodebuild clean archive \
            -project iTeamTalk.xcodeproj \
            -scheme iTeamTalk \
            -configuration Release \
            -archivePath build/iTeamTalkPlus.xcarchive \
            -derivedDataPath build/DerivedData \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES
      - name: Export IPA
        run: |
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath build/iTeamTalkPlus.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iTeamTalkPlus-${{ github.run_number }}
          path: build/ipa/*.ipa
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/ipa/*.ipa
          body: |
            ## iTeamTalkPlus ${{ github.ref_name }}
            - 12-tab dashboard interface
            - Full server administration
            - Enhanced audio processing
            - Media streaming support
            - File transfer management
            - Push-to-talk and voice activation
            - Text-to-speech events
            - Accessibility support

  lint:
    name: Lint
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --config .swiftlint.yml --strict 2>/dev/null || true
          else
            echo "SwiftLint not installed, skipping"
          fi
