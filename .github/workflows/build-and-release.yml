name: Build and Release iTeamTalkPlus IPA

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  APP_NAME: "iTeamTalkPlus"
  PROJECT_PATH: "iTeamTalk.xcodeproj"
  SCHEME: "iTeamTalk"
  SDK_DOWNLOAD_URL: "https://www.bearware.dk/teamtalksdk/v5.22a/tt5sdk_v5.22a_ios_universal.7z"

jobs:
  build-ipa:
    name: Build IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install 7-Zip
        run: brew install sevenzip

      - name: Download TeamTalk SDK Trial
        run: |
          curl -L -o /tmp/tt5sdk.7z "$SDK_DOWNLOAD_URL"
          echo "Downloaded SDK ($(du -h /tmp/tt5sdk.7z | cut -f1))"

      - name: Extract TeamTalk SDK
        run: |
          7z x /tmp/tt5sdk.7z -o/tmp/tt5sdk -y > /dev/null
          echo "SDK extraction contents:"
          ls -la /tmp/tt5sdk/
          echo "Looking for libTeamTalk5.a:"
          find /tmp/tt5sdk -name "libTeamTalk5.a"
          mkdir -p Library/TeamTalk_DLL
          cp $(find /tmp/tt5sdk -name "libTeamTalk5.a" | head -1) Library/TeamTalk_DLL/libTeamTalk5.a
          echo "After copy:"
          ls -la Library/TeamTalk_DLL/

      - name: Show build settings
        run: |
          xcodebuild -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -showBuildSettings \
            -destination "generic/platform=iOS" \
            2>&1 | head -30

      - name: Build .app bundle
        run: |
          xcodebuild clean build \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration ${{ github.event.inputs.build_config || 'Release' }} \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO

      - name: Create unsigned IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found!"
            find build/DerivedData -name "*.app" -type d
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r "${{ env.APP_NAME }}-unsigned.ipa" Payload/
          echo "IPA created: $(pwd)/${{ env.APP_NAME }}-unsigned.ipa"
          ls -lh "${{ env.APP_NAME }}-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.run_number }}
          path: build/${{ env.APP_NAME }}-unsigned.ipa
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.APP_NAME }}-unsigned.ipa
          body: |
            ## iTeamTalkPlus ${{ github.ref_name }}

            ### Download
            Download the unsigned IPA below and sign with AltStore.

            ### Features
            - 12-tab dashboard (Channels, Chat, Global, Private, Media, Files, Server Management, Users, Status, Events, My Status, Settings)
            - Server administration (user accounts, bans, properties)
            - Enhanced audio processing (AGC, NS, EC)
            - Media streaming (voice, video, desktop, file)
            - File transfer management
            - Push-to-talk with lock, voice activation
            - Text-to-speech event notifications
            - Broadcast, channel, and private messaging
            - Accessibility with VoiceOver
            - 19 languages

            ### Signing with AltStore
            1. Download the unsigned IPA
            2. Open AltStore on iOS -> My Apps -> + -> select IPA
            3. Enter Apple ID when prompted
            4. AltStore signs and installs

            ### Note
            Uses the 30-day trial TeamTalk SDK. For production use, purchase a license from BearWare.dk.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
